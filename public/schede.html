<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivio Schede — UW Merchant</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
  <div>
    <div class="logo">Scheda UW Merchant</div>
    <div class="subtitle">Analisi Dichiarazioni dei Redditi</div>
  </div>
  <nav>
    <a href="/">Nuova scheda</a>
    <a href="/schede.html" class="active">Archivio schede</a>
  </nav>
</header>

<main class="wide">
  <div class="page-header">
    <h1>Archivio schede</h1>
    <a href="/" class="btn-accent">+ Nuova scheda</a>
  </div>

  <div class="search-bar">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Cerca per nome o codice fiscale…">
  </div>

  <div class="count" id="count"></div>

  <div class="card">
    <div id="tableContainer" class="loading-msg">Caricamento…</div>
  </div>
</main>

<script>
let allSchede = [];

async function loadSchede() {
  try {
    const resp = await fetch('/api/schede');
    const data = await resp.json();
    allSchede = data.schede || [];
    render(allSchede);
  } catch (e) {
    document.getElementById('tableContainer').innerHTML = '<div class="empty">Errore nel caricamento.</div>';
  }
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function render(schede) {
  document.getElementById('count').textContent = schede.length
    ? `${schede.length} scheda${schede.length !== 1 ? 'e' : ''} trovata${schede.length !== 1 ? 'e' : ''}`
    : '';

  if (schede.length === 0) {
    document.getElementById('tableContainer').innerHTML =
      `<div class="empty">Nessuna scheda trovata. <a href="/">Genera la prima scheda →</a></div>`;
    return;
  }

  document.getElementById('tableContainer').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Ragione sociale</th>
          <th>Codice fiscale</th>
          <th>Anno</th>
          <th>Tipo</th>
          <th>Data creazione</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${schede.map(s => `
          <tr>
            <td class="nome">${s.ragione_sociale || 'n.d.'}</td>
            <td class="cf">${s.codice_fiscale || 'n.d.'}</td>
            <td class="anno">${s.anno_imposta || 'n.d.'}</td>
            <td class="anno">${s.tipo_dichiarazione || 'n.d.'}</td>
            <td class="data">${formatDate(s.created_at)}</td>
            <td><a class="btn-scheda" href="/scheda.html?id=${encodeURIComponent(s.id)}">Apri →</a></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  render(q ? allSchede.filter(s =>
    (s.ragione_sociale || '').toLowerCase().includes(q) ||
    (s.codice_fiscale || '').toLowerCase().includes(q)
  ) : allSchede);
});

loadSchede();
</script>
</body>
</html>
